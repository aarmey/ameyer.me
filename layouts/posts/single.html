{{ define "main" }}
<article class="single row gutters">

  <time class="published" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02 January 2006" }}</time>

  <h2>{{ .Title }}</h2>

    <div class="post-tag">{{ range .Params.tags }}#<a href="/archive/#{{ . | urlize }}-ref">{{ . }}</a>&nbsp;&nbsp;{{ end }}</div>

  {{ .Content }}
</article>
{{ end }}
